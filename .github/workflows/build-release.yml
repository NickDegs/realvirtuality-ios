name: iOS Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─── Simulator matrix — her model için en uygun Xcode ───────────────────────
# Güncelleme tarihi: 2026-06-07
# iPhone 17 serisi (iOS 19 / Xcode 26.x) — en güncel, Eylül 2025 çıkış
# iPhone 16 serisi (iOS 18 / Xcode 16.x) — geriye dönük uyumluluk
# iPhone 15 / 14 / SE — iOS 17-18 / Xcode 16.x
# iPad Pro M4 / iPad Air M2 / iPad mini (iPadOS 19 / Xcode 26.x)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Simulator build check (matrix) ────────────────────────────────────
  simulator-check:
    name: "Build · ${{ matrix.device }} · Xcode ${{ matrix.xcode }}"
    runs-on: macos-15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── iPhone 17 serisi — iOS 19 / Xcode 26
          - device: "iPhone 17 Pro Max"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          - device: "iPhone 17 Pro"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          - device: "iPhone 17 Air"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          - device: "iPhone 17"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          # ── iPhone 16 serisi — iOS 18 / Xcode 16
          - device: "iPhone 16 Pro Max"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          - device: "iPhone 16 Pro"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          - device: "iPhone 16 Plus"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          - device: "iPhone 16"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          # ── iPhone 15 serisi — iOS 18 / Xcode 16
          - device: "iPhone 15 Pro Max"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          - device: "iPhone 15"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          # ── iPhone 14 / SE — iOS 17 / Xcode 16
          - device: "iPhone 14 Pro Max"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          - device: "iPhone 14"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          - device: "iPhone SE (3rd generation)"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          # iPad YOK — uygulama iPhone-only (TARGETED_DEVICE_FAMILY=1).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          sudo xcode-select -s ${{ matrix.xcode_path }} 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.3.app 2>/dev/null || \
          true
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen --quiet

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project Downify.xcodeproj \
            -scheme Downify \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

  # ── 2. Release build → TestFlight (main'e her push'ta otomatik) ──────────
  release:
    name: "Release → TestFlight"
    runs-on: macos-15
    # Otomatik: main'e push + tag + manuel tetikleme → TestFlight'a direkt yollar
    # (boolean input doğrudan kullanılır; 'true' string karşılaştırması boolean'da hep false döner)
    if: github.event_name == 'push' || inputs.upload_to_testflight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest available)
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.3.app 2>/dev/null || \
          true
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen --quiet

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Distribution Certificate
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$DIST_P12_BASE64" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 -P "$DIST_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Install Provisioning Profiles
        env:
          DIST_PROFILE_MAIN_BASE64: ${{ secrets.DIST_PROFILE_MAIN_BASE64 }}
          DIST_PROFILE_SHARE_BASE64: ${{ secrets.DIST_PROFILE_SHARE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$DIST_PROFILE_MAIN_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/downify_main.mobileprovision
          echo "$DIST_PROFILE_SHARE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/downify_share.mobileprovision

      - name: Decode ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Build Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M)
          echo "Build number: $BUILD_NUMBER"
          xcodebuild archive \
            -project Downify.xcodeproj \
            -scheme Downify \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Downify.xcarchive \
            -destination "generic/platform=iOS" \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain"

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.downify</key>
              <string>Downify AppStore Distribution</string>
              <key>app.downify.share</key>
              <string>DownifyShare AppStore Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Downify.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Downify-release
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      # TestFlight'a yükleme — Xcode 16/26'da altool kaldırıldı.
      # Modern yol: ExportOptions'ta destination=upload ile xcodebuild -exportArchive doğrudan yükler.
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/UploadOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.downify</key>
              <string>Downify AppStore Distribution</string>
              <key>app.downify.share</key>
              <string>DownifyShare AppStore Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Downify.xcarchive \
            -exportPath $RUNNER_TEMP/upload \
            -exportOptionsPlist $RUNNER_TEMP/UploadOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          echo "✅ TestFlight'a yüklendi (App Store Connect işleme alacak, birkaç dk sonra TestFlight'ta görünür)"

      # Build işlendikten sonra export compliance'ı otomatik cevapla + internal
      # test grubuna ekle → yeni build testçilerde KENDİLİĞİNDEN görünür.
      - name: Auto export-compliance + internal test group
        if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          pip3 install --quiet pyjwt requests cryptography 2>/dev/null || pip3 install --quiet --break-system-packages pyjwt requests cryptography
          python3 - <<'PYEOF'
          import os, time, jwt, requests
          KEY_ID=os.environ["ASC_KEY_ID"]; ISS=os.environ["ASC_ISSUER_ID"]
          KEY=open(os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{KEY_ID}.p8")).read()
          def tok():
              now=int(time.time())
              return jwt.encode({"iss":ISS,"iat":now,"exp":now+1100,"aud":"appstoreconnect-v1"},
                                KEY, algorithm="ES256", headers={"kid":KEY_ID})
          B="https://api.appstoreconnect.apple.com"
          def api(m,p,**kw):
              return requests.request(m, B+p, headers={"Authorization":f"Bearer {tok()}","Content-Type":"application/json"}, **kw)
          app=api("GET","/v1/apps?filter[bundleId]=app.downify").json()["data"][0]["id"]
          grp=[g["id"] for g in api("GET",f"/v1/apps/{app}/betaGroups?limit=20").json()["data"]
               if g["attributes"]["isInternalGroup"]]
          gid=grp[0] if grp else None
          bid=None
          for _ in range(48):  # ~12 dk
              b=api("GET",f"/v1/builds?filter[app]={app}&sort=-uploadedDate&limit=1&fields[builds]=processingState").json()["data"]
              if b and b[0]["attributes"]["processingState"]=="VALID":
                  bid=b[0]["id"]; break
              time.sleep(15)
          if not bid:
              print("build hâlâ işleniyor; ASC sonra otomatik tamamlar"); raise SystemExit
          import json as J
          api("PATCH",f"/v1/builds/{bid}",data=J.dumps({"data":{"type":"builds","id":bid,"attributes":{"usesNonExemptEncryption":False}}}))
          if gid:
              api("POST",f"/v1/betaGroups/{gid}/relationships/builds",data=J.dumps({"data":[{"type":"builds","id":bid}]}))
          print("✅ export compliance + internal grup ayarlandı, build TestFlight'ta görünür")
          PYEOF

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/export/*.ipa
          generate_release_notes: true
