name: iOS Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

# ─── Simulator matrix — her model için en uygun Xcode ───────────────────────
# Güncelleme tarihi: 2026-06-05
# iPhone 16 serisi (iOS 19 / Xcode 26.x)
# iPhone 15 serisi (iOS 18 / Xcode 16.x) — geriye dönük uyumluluk
# iPad Pro M4 (iPadOS 19 / Xcode 26.x)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Simulator build check (matrix) ────────────────────────────────────
  simulator-check:
    name: "Build · ${{ matrix.device }} · Xcode ${{ matrix.xcode }}"
    runs-on: macos-15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # iPhone 16 serisi — Xcode 26
          - device: "iPhone 16 Pro Max"
            os: "19.0"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          - device: "iPhone 16 Pro"
            os: "19.0"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          - device: "iPhone 16 Plus"
            os: "19.0"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          - device: "iPhone 16"
            os: "19.0"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          # iPhone 15 serisi — Xcode 16 (geriye uyumluluk)
          - device: "iPhone 15 Pro Max"
            os: "18.5"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          - device: "iPhone 15"
            os: "18.5"
            xcode: "16.3"
            xcode_path: "/Applications/Xcode_16.3.app"
          # iPad — Xcode 26
          - device: "iPad Pro 13-inch (M4)"
            os: "19.0"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"
          - device: "iPad Air 13-inch (M2)"
            os: "19.0"
            xcode: "26.3"
            xcode_path: "/Applications/Xcode_26.3.app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          sudo xcode-select -s ${{ matrix.xcode_path }} 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.3.app 2>/dev/null || \
          true
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen --quiet

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project Downify.xcodeproj \
            -scheme Downify \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

  # ── 2. Release build → TestFlight (sadece tag'de) ────────────────────────
  release:
    name: "Release → TestFlight"
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_testflight == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest available)
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.3.app 2>/dev/null || \
          true
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen --quiet

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Distribution Certificate
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$DIST_P12_BASE64" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 -P "$DIST_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Install Provisioning Profiles
        env:
          DIST_PROFILE_MAIN_BASE64: ${{ secrets.DIST_PROFILE_MAIN_BASE64 }}
          DIST_PROFILE_SHARE_BASE64: ${{ secrets.DIST_PROFILE_SHARE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$DIST_PROFILE_MAIN_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/downify_main.mobileprovision
          echo "$DIST_PROFILE_SHARE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/downify_share.mobileprovision

      - name: Decode ASC API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Build Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project Downify.xcodeproj \
            -scheme Downify \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Downify.xcarchive \
            -destination "generic/platform=iOS" \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain"

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.downify</key>
              <string>Downify AppStore Distribution</string>
              <key>app.downify.share</key>
              <string>DownifyShare AppStore Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Downify.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Downify-release
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(ls $RUNNER_TEMP/export/*.ipa)" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --apiPrivateKey ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --verbose

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ runner.temp }}/export/*.ipa
          generate_release_notes: true
