workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      vars:
        BUNDLE_ID: "app.downify"
        APP_STORE_APP_ID: "6776535284"
      app_store_connect:
        api_key: $ASC_KEY_ID
        issuer_id: $ASC_ISSUER_ID
        key: $ASC_KEY_BASE64

    scripts:
      - name: Install xcodegen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Set version
        script: |
          LATEST_BUILD=$(app-store-connect get-latest-build-number "$APP_STORE_APP_ID" || echo "0")
          agvtool new-version -all $((LATEST_BUILD + 1))

      - name: Build and sign
        script: |
          xcodebuild archive \
            -project Downify.xcodeproj \
            -scheme Downify \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/Downify.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=SZF4T3P583

      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>SZF4T3P583</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/Downify.xcarchive \
            -exportPath $CM_BUILD_DIR/export \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        script: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(ls $CM_BUILD_DIR/export/*.ipa)" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --apiPrivateKey <(echo "$ASC_KEY_BASE64" | base64 --decode) \
            --verbose

    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
      - $CM_BUILD_DIR/Downify.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
