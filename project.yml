name: Downify
options:
  bundleIdPrefix: app
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  developmentLanguage: tr

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "10"

targets:
  Downify:
    type: application
    platform: iOS
    bundleId: app.downify
    deploymentTarget: "26.0"
    sources:
      - path: Downify
        excludes:
          - "**/*.entitlements"
    resources:
      - path: Downify/Resources
    entitlements:
      path: Downify/Downify.entitlements
    info:
      path: Downify/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
    settings:
      base:
        PRODUCT_NAME: Downify
        PRODUCT_BUNDLE_IDENTIFIER: app.downify
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SZF4T3P583
        INFOPLIST_FILE: Downify/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: ""
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Downify AppStore Distribution"
    dependencies:
      - target: DownifyShareExtension
        embed: true

  DownifyShareExtension:
    type: app-extension
    platform: iOS
    bundleId: app.downify.share
    deploymentTarget: "26.0"
    sources:
      - path: ShareExtension
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Downify
        NSPhotoLibraryAddUsageDescription: "Videolar ve görseller fotoğraf kütüphanenize kaydedilecek."
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
    settings:
      base:
        PRODUCT_NAME: DownifyShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: app.downify.share
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SZF4T3P583
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "DownifyShare AppStore Distribution"
    dependencies: []

packages: {}

schemes:
  Downify:
    build:
      targets:
        Downify: all
        DownifyShareExtension: all
    archive:
      config: Release
