name: Downify
options:
  bundleIdPrefix: app
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"

targets:
  Downify:
    type: application
    platform: iOS
    bundleId: app.downify
    deploymentTarget: "16.0"
    sources:
      - path: Downify
        excludes:
          - "**/*.entitlements"
    resources:
      - path: Downify/Resources
    entitlements:
      path: Downify/Downify.entitlements
    info:
      path: Downify/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
    settings:
      base:
        PRODUCT_NAME: Downify
        PRODUCT_BUNDLE_IDENTIFIER: app.downify
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SZF4T3P583
        INFOPLIST_FILE: Downify/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: ""
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Downify AppStore Distribution"
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift

  DownifyShareExtension:
    type: app-extension
    platform: iOS
    bundleId: app.downify.share
    deploymentTarget: "16.0"
    sources:
      - path: ShareExtension
    info:
      path: ShareExtension/Info.plist
    settings:
      base:
        PRODUCT_NAME: DownifyShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: app.downify.share
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SZF4T3P583
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "DownifyShare AppStore Distribution"
    dependencies: []

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

schemes:
  Downify:
    build:
      targets:
        Downify: all
        DownifyShareExtension: all
    archive:
      config: Release
